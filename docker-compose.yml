version: "3.9"

services:
  app:
    # 默认直接使用已构建镜像；如果你想本地构建，可注释 image 并取消下一行
    image: ghcr.io/lyc1466/tg-autosign:latest
    # build: .
    container_name: tg-autosign
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 所有运行数据都会写到这里，包括数据库、sessions、日志等
      - ./data:/data
    environment:
      # ===== 基础运行项 =====
      - APP_HOST=0.0.0.0
      - PORT=8080
      - TZ=Asia/Shanghai

      # ===== 必改安全项 =====
      - APP_SECRET_KEY=replace_with_a_random_secret
      # 初始管理员账号仅在首次创建用户表为空时生效
      # - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change_me

      # ===== 常用可选项 =====
      # Telegram API：首次启动可先用环境变量注入；若后续在 UI 中保存新值，则 UI 配置优先
      # - TG_API_ID=123456
      # - TG_API_HASH=your_api_hash_here

      # 共享代理；账号单独代理会覆盖这里
      # - TG_PROXY=socks5://127.0.0.1:1080

      # 统一客户端设备参数
      # - TG_DEVICE_MODEL=Samsung Galaxy S24
      # - TG_SYSTEM_VERSION=SDK 35
      # - TG_APP_VERSION=11.4.2
      # - TG_LANG_CODE=zh

      # AI 配置、数据目录统一在 UI -> 系统设置 中维护
